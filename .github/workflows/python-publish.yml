# Publish `nextjs-docs-rag` to PyPI when a GitHub Release is published.
#
# Prerequisites (Trusted Publishing — recommended):
#   1. https://pypi.org/manage/account/publishing/
#      Add your GitHub repo as an "pending" trusted publisher:
#      - PyPI project name: nextjs-docs-rag
#      - Owner / repo / workflow filename: matching this repo and this file
#
#   2. GitHub repo → Settings → Environments → create `pypi`
#      (Used below for deployment protection rules / approvals if you want.)
#
# Alternative (API token): remove `permissions: id-token: write`, set repository secret
#   `PYPI_API_TOKEN`, and extend the publish step — see gh-action-pypi-publish docs.

name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/project/rag-nextjs/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
